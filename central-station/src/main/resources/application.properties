spring.application.name=central-station

# Bitcask Storage Properties
bitcask.data-path=${BITCASK_DATA_PATH:/data/bitcask}
# Compaction runs every 5 minutes by default (override via env var BITCASK_COMPACTION_INTERVAL_MS)
bitcask.compaction.interval-ms=${BITCASK_COMPACTION_INTERVAL_MS:300000}

# Spring Kafka Properties
spring.kafka.bootstrap-servers=${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# Spring Kafka Streams Properties
spring.kafka.streams.application-id=central-station-processor
spring.kafka.streams.properties.default.key.serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.properties.default.value.serde=org.springframework.kafka.support.serializer.JsonSerde
spring.kafka.streams.properties.spring.json.trusted.packages=*

# Error handling: Log and continue on deserialization errors instead of crashing the stream
spring.kafka.streams.properties.default.deserialization.exception.handler=org.apache.kafka.streams.errors.LogAndContinueExceptionHandler

# Application Specific Properties
app.topic.input=${APP_TOPIC_INPUT:weather.telemetry.v1}
app.topic.alerts=${APP_TOPIC_ALERTS:weather.alerts.rain.v1}

# Spring Kafka Consumer Properties
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=org.example.centralstation.model.WeatherStatus
spring.kafka.consumer.properties.spring.json.use.type.headers=false
