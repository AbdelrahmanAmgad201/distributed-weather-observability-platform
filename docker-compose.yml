  # -------------------------
  # CENTRAL PROCESSING
  # -------------------------
  central-station:
    build: ./central-station
    ports:
      - "8085:8080"
    environment:
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - APP_TOPIC_INPUT=weather.telemetry.v1
      - APP_TOPIC_ALERTS=weather.alerts.rain.v1
      - BITCASK_DATA_PATH=/data/bitcask
      - PARQUET_DATA_PATH=/data/parquet
      - ARCHIVER_FLUSH_INTERVAL_MS=30000
    volumes:
      - bitcask_data:/data/bitcask
      - parquet_data:/data/parquet
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure

  # -------------------------
  # PARQUET → ELASTICSEARCH BRIDGE
  # -------------------------
  parquet-es-bridge:
    build: ./parquet-es-bridge
    environment:
      - PARQUET_DIR=/data/parquet
      - ES_HOST=http://elasticsearch:9200
      - ES_INDEX=weather-telemetry
    volumes:
      - parquet_data:/data/parquet
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure

volumes:
  bitcask_data:
  parquet_data:

networks:
  app-net:
    driver: bridge