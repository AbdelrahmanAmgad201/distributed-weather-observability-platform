services:

  # -------------------------
  # KAFKA (KRaft, single-node)
  # -------------------------
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT'
      KAFKA_LISTENERS: 'INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093'
      KAFKA_ADVERTISED_LISTENERS: 'INTERNAL://kafka:29092,EXTERNAL://localhost:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'INTERNAL'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:9093'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - app-net

  # -------------------------
  # KAFKA UI
  # -------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net

  # -------------------------
  # ELASTIC STACK
  # -------------------------
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
    container_name: es01
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - app-net

  kibana:
    image: docker.elastic.co/kibana/kibana:9.4.0
    container_name: kib01
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      ELASTICSEARCH_HOSTS: "http://elasticsearch:9200"
    ports:
      - "5601:5601"
    networks:
      - app-net

  # -------------------------
  # WEATHER STATIONS — RANDOM (1-5)
  # -------------------------
  weather-station-1:
    build: ./weather-station-mock
    environment:
      - MODE=random
      - KAFKA_BROKER=kafka:29092
      - TOPIC_NAME=weather.telemetry.v1
      - STATION_ID=1
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure

  weather-station-2:
    build: ./weather-station-mock
    environment:
      - MODE=random
      - KAFKA_BROKER=kafka:29092
      - TOPIC_NAME=weather.telemetry.v1
      - STATION_ID=2
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-net
    restart: on-failure

  weather-station-3:
    build: ./weather-station-mock
    environment:
      - MODE=random
      - KAFKA_BROKER=kafka:29092
      - TOPIC_NAME=weather.telemetry.v1
      - STATION_ID=3
    depends_on:
