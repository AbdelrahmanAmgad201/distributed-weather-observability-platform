apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: weather
  labels:
    app: kafka
spec:
  # ClusterIP: Kafka is only accessible inside the cluster.
  # All weather stations and the central station reach it via:
  #   kafka.weather.svc.cluster.local:9092
  type: ClusterIP
  selector:
    app: kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
