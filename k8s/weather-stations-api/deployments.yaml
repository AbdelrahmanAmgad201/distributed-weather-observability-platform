apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station-6
  namespace: weather
  labels:
    app: weather-station
    station-id: "6"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-station
      station-id: "6"
  template:
    metadata:
      labels:
        app: weather-station
        station-id: "6"
    spec:
      containers:
        - name: weather-station
          image: weather-station-mock:latest
          imagePullPolicy: Never
          envFrom:
            - configMapRef:
                name: weather-station-api-config
          env:
            - name: STATION_ID
              value: "6"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

