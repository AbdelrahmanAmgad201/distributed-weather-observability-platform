# Station 11: fetches real weather data from the Open-Meteo external API.
# Requires outbound internet access — works out-of-the-box on Minikube.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station-11
  namespace: weather
  labels:
    app: weather-station
    station-id: "11"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-station
      station-id: "11"
  template:
    metadata:
      labels:
        app: weather-station
        station-id: "11"
    spec:
      containers:
        - name: weather-station
          image: weather-station-mock:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: weather-station-api-config
          env:
            - name: STATION_ID
              value: "11"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
