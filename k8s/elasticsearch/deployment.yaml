apiVersion: apps/v1
kind: Deployment
metadata:
  name: elasticsearch
  namespace: weather
  labels:
    app: elasticsearch
spec:
  replicas: 1
  selector:
    matchLabels:
      app: elasticsearch
  template:
    metadata:
      labels:
        app: elasticsearch
    spec:
      containers:
        - name: elasticsearch
          image: docker.elastic.co/elasticsearch/elasticsearch:9.4.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9200
            - name: transport
              containerPort: 9300
          env:
            - name: discovery.type
              value: "single-node"
            - name: xpack.security.enabled
              value: "false"
            - name: ES_JAVA_OPTS
              value: "-Xms512m -Xmx512m"
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -fs http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - "curl -fs http://localhost:9200/_cluster/health"
            initialDelaySeconds: 60
            periodSeconds: 20
          resources:
            requests:
              memory: "1Gi"
              cpu: "500m"
            limits:
              memory: "1.5Gi"
              cpu: "1000m"

---
apiVersion: v1
kind: Service
metadata:
  name: elasticsearch
  namespace: weather
  labels:
    app: elasticsearch
spec:
  type: NodePort
  selector:
    app: elasticsearch
  ports:
    - name: http
      port: 9200
      targetPort: 9200
