# Weather stations 1-10: random/synthetic data mode.
#
# Each station is a separate 1-replica Deployment so it gets its own unique
# STATION_ID environment variable without any code changes.
# Shared config (KAFKA_BROKER, TOPIC_NAME, MODE) comes from the ConfigMap.
#
# If you want to add or remove stations, duplicate or delete a block below.

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: weather-station-1
  namespace: weather
  labels:
    app: weather-station
    station-id: "1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: weather-station
      station-id: "1"
  template:
    metadata:
      labels:
        app: weather-station
        station-id: "1"
    spec:
      containers:
        - name: weather-station
          image: weather-station-mock:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: weather-station-mock-config
          env:
            - name: STATION_ID
              value: "1"
          resources:
            requests:
              memory: "128Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"

