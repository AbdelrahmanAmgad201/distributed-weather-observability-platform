apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: weather-station
  namespace: weather
spec:
  serviceName: weather-station 
  replicas: 10                   # pods: weather-station-0 … weather-station-9

  selector:
    matchLabels:
      app: weather-station

  template:
    metadata:
      labels:
        app: weather-station
    spec:
      containers:
        - name: weather-station
          image: weather-station-mock:latest
          imagePullPolicy: Never  
          command: ["/bin/sh", "-c"]
          args:
            - |
              export STATION_ID=$((${HOSTNAME##*-} + 1))
              echo "Starting station ID: $STATION_ID"
              exec <YOUR_ORIGINAL_STARTUP_COMMAND>
              # e.g. exec python main.py
              # e.g. exec java -jar app.jar
              # e.g. exec node index.js

          envFrom:
            - configMapRef:
                name: weather-station-config

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"

---
# Headless service — required by StatefulSet to assign stable DNS names
# (weather-station-0.weather-station.weather.svc.cluster.local, etc.)
# You don't call this service directly; StatefulSet uses it internally.
apiVersion: v1
kind: Service
metadata:
  name: weather-station
  namespace: weather
spec:
  clusterIP: None   # "None" = headless service
  selector:
    app: weather-station
  ports:
    - port: 80       # placeholder — weather stations don't expose HTTP